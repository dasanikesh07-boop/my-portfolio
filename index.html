<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Instant Band Name Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">
        <h1>🎸 Band Name Generator</h1>
        <p>Need inspiration for your next music project? Let the machine decide.</p>
        
        <div class="input-group">
            <input type="text" id="genreInput" placeholder="e.g., Rock, Synth, Neon, Ghost">
            <button id="generateBtn">Generate Name</button>
        </div>

        <h2 id="result">Your band name will appear here...</h2>
    </div>

    <script src="script.js"></script>
</body>
</html>
